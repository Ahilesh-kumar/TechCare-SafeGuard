services:
  - type: web
    name: techcare-safeguard-api
    plan: free
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.index:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: BAND_API_KEY
        sync: false
      - key: BAND_COORDINATOR_ID
        sync: false
      - key: BAND_ANALYST_ID
        sync: false
      - key: BAND_AUDITOR_ID
        sync: false
      - key: BAND_COORDINATOR_TOKEN
        sync: false
      - key: BAND_ANALYST_TOKEN
        sync: false
      - key: BAND_AUDITOR_TOKEN
        sync: false
      - key: BAND_EXECUTION_ID
        sync: false
      - key: BAND_EXECUTION_TOKEN
        sync: false
      - key: BAND_FORENSIC_ID
        sync: false
      - key: BAND_FORENSIC_TOKEN
        sync: false
      - key: BAND_CURATOR_ID
        sync: false
      - key: BAND_CURATOR_TOKEN
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.9"
